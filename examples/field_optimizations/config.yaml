metadata_root: "./examples/field_optimizations/"
metadata_file_name: "calibration_metadata_all_heliostats.csv"
data_dir: "/workVERLEIHNIX/share/PAINT"
tower_file_name: "WRI1030197-tower-measurements.json"
scenarios_dir: "./examples/field_optimizations/scenarios"
measured_data_dir: "./examples/field_optimizations/measured_data"
results_dir: "./examples/field_optimizations/results"
plots_dir: "./examples/field_optimizations/plots"
