minimum_number_of_measurements: 6
kinematic_reconstruction_image_type: "flux"
surface_reconstruction_image_type: "flux-centered"
excluded_heliostats_for_reconstruction: ["BE20", "AP14", "AG21"]
heliostats_for_plots:
  - "AK54"
  - "AM55"
  - "AM56"
random_seed: 7
device: "cuda"
surface_reconstruction_optimization_configuration:
  max_epoch: 2
  batch_size: 48
  batch_size_outer: 48
  number_of_surface_points: 50
  number_of_control_points: 6
  number_of_rays: 170
  nurbs_degree: 3
  sample_limit: 2
  initial_learning_rate: 1e-06
  scheduler: "cyclic"
  min_learning_rate: 1e-06
  max_learning_rate: 0.0001
  step_size_up: 122
  reduce_factor: 0.2
  patience: 3
  threshold: 0.001
  cooldown: 5
  gamma: 0.92
  energy_tolerance: 0.01
  rho_flux_integral: 1.0
  weight_smoothness: 0.00
  weight_ideal_surface: 0.10
kinematics_reconstruction_optimization_configuration:
  max_epoch: 2
  batch_size: 192
  sample_limit: 2
  number_of_rays: 10
  initial_learning_rate: 1e-07
  scheduler: "cyclic"
  min_learning_rate: 1e-06
  max_learning_rate: 0.0001
  step_size_up: 122
  reduce_factor: 0.2
  patience: 3
  threshold: 0.001
  cooldown: 5
  gamma: 0.92
aim_point_optimization_configuration:
  max_epoch: 2
  batch_size: 96
  number_of_rays: 4
  initial_learning_rate: 1e-03
  scheduler: "cyclic"
  min_learning_rate: 1e-06
  max_learning_rate: 0.0001
  step_size_up: 122
  reduce_factor: 0.2
  patience: 3
  threshold: 0.001
  cooldown: 5
  gamma: 0.92
  rho_flux_integral: 1.0
  rho_local_flux: 1.0
  rho_spillage: 1.0
  max_flux_density: 1000000 # W/m^2
basic_config:
  batch_size: 96
  number_of_rays: 4
  dni: 500
  baseline_incident_ray_direction: [0.411, 0.706, -0.576, 0.0]
  baseline_target_area: "receiver"
